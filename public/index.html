<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebinwebOS v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root {
            --accent: #0078d4;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --bg-window: rgba(25, 25, 25, 0.8);
        }

        body, html { 
            margin: 0; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI Variable', sans-serif;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80') center/cover;
        }

        /* --- Desktop & Context Menu --- */
        #desktop { width: 100vw; height: 100vh; padding: 20px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px; }
        
        #context-menu {
            position: absolute; width: 180px; background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(15px); border: 1px solid var(--border);
            border-radius: 8px; display: none; flex-direction: column; padding: 5px; z-index: 9999;
        }
        .menu-item { padding: 8px 12px; color: white; font-size: 13px; cursor: pointer; border-radius: 4px; }
        .menu-item:hover { background: var(--accent); }

        /* --- Icons (Estilo Win11/macOS) --- */
        .item { 
            width: 90px; height: 100px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-radius: 8px; transition: 0.2s;
        }
        .item:hover { background: rgba(255,255,255,0.1); }
        .icon-box {
            width: 50px; height: 50px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 5px;
        }
        .label { color: white; font-size: 12px; text-shadow: 0 1px 3px black; text-align: center; width: 80px; overflow: hidden; text-overflow: ellipsis; }

        /* --- Windows --- */
        .window {
            position: absolute; width: 800px; height: 500px; 
            background: var(--bg-window); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 12px;
            display: none; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10;
        }
        .win-header { padding: 12px 15px; display: flex; align-items: center; background: rgba(255,255,255,0.03); cursor: move; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close { background: #ff5f57; } .min { background: #febc2e; } .max { background: #28c840; }
        .win-title { flex: 1; text-align: center; color: #aaa; font-size: 13px; font-weight: 500; }
        .win-body { flex: 1; padding: 20px; overflow: auto; color: white; }

        /* --- Dock --- */
        #dock {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            padding: 10px 18px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; gap: 15px; z-index: 1000;
        }
        .dock-app { width: 45px; height: 45px; cursor: pointer; transition: 0.3s; }
        .dock-app:hover { transform: scale(1.2) translateY(-10px); }

        /* --- Apps Specifics --- */
        #browser-frame { width: 100%; height: 100%; border-radius: 8px; background: white; border: none; }
        #term-log { font-family: 'Consolas', monospace; color: #00ff00; font-size: 14px; }
        #chat-log { height: 80%; border: 1px solid var(--border); padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        textarea { width: 100%; height: 80%; background: transparent; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; resize: none; }
    </style>
</head>
<body oncontextmenu="return showMenu(event)">

<div id="desktop"></div>

<div id="context-menu">
    <div class="menu-item" onclick="createFile()">Nuevo Archivo .txt</div>
    <div class="menu-item" onclick="createFolder()">Nueva Carpeta</div>
    <hr style="border:0; border-top:1px solid #444;">
    <div class="menu-item" onclick="location.reload()">Refrescar OS</div>
</div>

<div id="win-files" class="window">
    <div class="win-header"><div class="dots"><div class="dot close" onclick="closeWin('win-files')"></div></div><div class="win-title">Explorador</div></div>
    <div class="win-body"><div id="explorer-content" style="display: flex; gap: 15px;"></div></div>
</div>

<div id="win-terminal" class="window">
    <div class="win-header"><div class="dots"><div class="dot close" onclick="closeWin('win-terminal')"></div></div><div class="win-title">Terminal</div></div>
    <div class="win-body" style="background:#000;">
        <div id="term-log">WebinwebOS Terminal v4.0<br>Type 'help' for info.</div>
        <div style="display:flex;"><span>> </span><input type="text" id="term-in" style="background:none; border:none; color:#0f0; outline:none; flex:1; padding-left:10px;"></div>
    </div>
</div>

<div id="win-editor" class="window">
    <div class="win-header"><div class="dots"><div class="dot close" onclick="closeWin('win-editor')"></div></div><div class="win-title">Editor de Texto</div></div>
    <div class="win-body">
        <textarea id="editor-area" placeholder="Escribe aquí..."></textarea>
        <div style="margin-top:10px;">
            <button onclick="exportTo('pdf')">Export PDF</button>
            <button onclick="exportTo('docx')">Export DOCX</button>
        </div>
    </div>
</div>

<div id="win-browser" class="window" style="width:90%; height:80%;">
    <div class="win-header"><div class="dots"><div class="dot close" onclick="closeWin('win-browser')"></div></div><div class="win-title">Navegador</div></div>
    <div style="padding:10px; display:flex; gap:10px;">
        <input type="text" id="url-bar" value="https://www.bing.com" style="flex:1; padding:5px; border-radius:5px;">
        <button onclick="goURL()">Ir</button>
    </div>
    <div class="win-body" style="padding:0;"><iframe id="browser-frame" src="https://www.bing.com"></iframe></div>
</div>

<div id="win-chat" class="window">
    <div class="win-header"><div class="dots"><div class="dot close" onclick="closeWin('win-chat')"></div></div><div class="win-title">Chat Online</div></div>
    <div class="win-body">
        <div id="chat-log"></div>
        <input type="text" id="chat-in" placeholder="Mensaje..." style="width:100%; padding:10px; background:#222; border:none; color:white;">
    </div>
</div>

<div id="dock">
    <div class="dock-app" onclick="openWin('win-files')"><svg viewBox="0 0 24 24" style="fill:#ffd166"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
    <div class="dock-app" onclick="openWin('win-terminal')"><svg viewBox="0 0 24 24" style="fill:#333"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H5v-2h6v2zm9-4H5V8h15v4z"/></svg></div>
    <div class="dock-app" onclick="openWin('win-editor')"><svg viewBox="0 0 24 24" style="fill:#4facfe"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></div>
    <div class="dock-app" onclick="openWin('win-browser')"><svg viewBox="0 0 24 24" style="fill:#00f2fe"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM11 19.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93z"/></svg></div>
    <div class="dock-app" onclick="openWin('win-chat')"><svg viewBox="0 0 24 24" style="fill:#27c840"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
</div>

<script>
    // --- FS Engine ---
    let fs = JSON.parse(localStorage.getItem('wos_fs')) || {
        "Proyectos": { type: 'dir' },
        "Leeme.txt": { type: 'file', content: 'Bienvenidos a la v4.0' }
    };

    function updateFS() {
        localStorage.setItem('wos_fs', JSON.stringify(fs));
        renderDesk();
    }

    function renderDesk() {
        const desk = document.getElementById('desktop');
        desk.innerHTML = '';
        Object.keys(fs).forEach(name => {
            const isDir = fs[name].type === 'dir';
            desk.innerHTML += `
                <div class="item" ondblclick="openItem('${name}')">
                    <div class="icon-box" style="background: ${isDir?'linear-gradient(135deg, #ffcc33, #ffb347)':'linear-gradient(135deg, #eee, #bbb)'}">
                        <svg width="30" viewBox="0 0 24 24" style="fill:white"><path d="${isDir?'M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z':'M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z'}"></path></svg>
                    </div>
                    <div class="label">${name}</div>
                </div>`;
        });
    }

    // --- Core Funcs ---
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function goURL() { document.getElementById('browser-frame').src = document.getElementById('url-bar').value; }

    // --- Menu Contextual ---
    function showMenu(e) {
        e.preventDefault();
        const m = document.getElementById('context-menu');
        m.style.display = 'flex';
        m.style.left = e.pageX + 'px';
        m.style.top = e.pageY + 'px';
    }
    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function createFile() {
        const n = prompt("Nombre:");
        if(n) { fs[n+".txt"] = {type:'file', content:''}; updateFS(); }
    }
    function createFolder() {
        const n = prompt("Nombre:");
        if(n) { fs[n] = {type:'dir'}; updateFS(); }
    }

    // --- Terminal ---
    document.getElementById('term-in').onkeydown = (e) => {
        if(e.key === 'Enter') {
            const cmd = e.target.value;
            const log = document.getElementById('term-log');
            if(cmd === 'ls') log.innerHTML += `<br>> ${cmd}<br>${Object.keys(fs).join(' ')}`;
            else if(cmd === 'sysinfo') log.innerHTML += `<br>> ${cmd}<br>WebinwebOS v4.0 Kernel v1.0`;
            else if(cmd === 'clear') log.innerHTML = '';
            e.target.value = '';
        }
    };

    // --- Drag Windows ---
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            let w = h.parentElement;
            let sx = e.clientX - w.offsetLeft;
            let sy = e.clientY - w.offsetTop;
            document.onmousemove = (e) => { w.style.left = (e.clientX-sx)+'px'; w.style.top = (e.clientY-sy)+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    renderDesk();
</script>
</body>
</html>

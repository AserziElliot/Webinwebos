<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebinwebOS v3.0 - Crystal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00a2ff;
            --text: #ffffff;
            --dock-bg: rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', 'San Francisco', sans-serif; }
        
        body, html { 
            margin: 0; height: 100%; overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover;
        }

        /* --- Escritorio y Rejilla de Archivos --- */
        #desktop {
            width: 100vw; height: 100vh;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 110px);
            grid-flow: column;
            gap: 20px;
        }

        /* --- Iconos Minimalistas (Estilo Moderno) --- */
        .desktop-item {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 10px; border-radius: 12px;
            transition: background 0.3s;
        }
        .desktop-item:hover { background: rgba(255,255,255,0.15); }
        
        .icon-shape {
            width: 55px; height: 55px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            margin-bottom: 8px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .icon-shape svg { width: 30px; height: 30px; fill: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .item-label { color: white; font-size: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center; }

        /* --- Ventanas Estilo macOS/Win11 --- */
        .window {
            position: absolute; width: 750px; height: 480px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: none; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            z-index: 10; overflow: hidden;
        }

        .window-header {
            padding: 15px; display: flex; align-items: center;
            background: rgba(255,255,255,0.05); cursor: move;
        }

        .win-controls { display: flex; gap: 8px; margin-right: 20px; }
        .circle { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #ff5f57; cursor: pointer; }
        .min { background: #febc2e; }
        .max { background: #28c840; }

        .win-title { font-size: 13px; font-weight: 500; color: #ccc; flex-grow: 1; text-align: center; }

        .window-content { flex: 1; padding: 20px; overflow: auto; color: white; }

        /* --- Dock (Barra de tareas) --- */
        #dock-container {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: var(--dock-bg); backdrop-filter: blur(15px);
            padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex; gap: 12px; align-items: center; z-index: 1000;
        }

        .dock-icon {
            width: 45px; height: 45px; cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dock-icon:hover { transform: translateY(-10px) scale(1.2); }

        /* --- Componentes Internos --- */
        textarea { width: 100%; height: 85%; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); border-radius: 10px; padding: 15px; outline: none; resize: none; }
        #term-out { font-family: 'Consolas', monospace; color: #39ff14; }
        .cmd-line { display: flex; color: var(--accent); gap: 10px; margin-top: 5px; }
        input[type="text"] { background: transparent; border: none; color: white; outline: none; flex: 1; }

        /* Grid del Explorador */
        .file-explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, 90px); gap: 15px; }
    </style>
</head>
<body>

<div id="desktop">
    </div>

<div id="win-files" class="window">
    <div class="window-header">
        <div class="win-controls"><div class="circle close" onclick="closeApp('win-files')"></div><div class="circle min"></div><div class="circle max"></div></div>
        <div class="win-title">Explorador de Archivos</div>
    </div>
    <div class="window-content">
        <div id="explorer-view" class="file-explorer-grid"></div>
    </div>
</div>

<div id="win-terminal" class="window">
    <div class="window-header">
        <div class="win-controls"><div class="circle close" onclick="closeApp('win-terminal')"></div><div class="circle min"></div><div class="circle max"></div></div>
        <div class="win-title">Terminal Bash</div>
    </div>
    <div class="window-content" style="background: #0c0c0c;">
        <div id="term-out">WebinwebOS [Version 3.0.0]<br>Type 'help' for commands.</div>
        <div class="cmd-line"><span>webinweb@local:~$</span><input type="text" id="term-in" autofocus></div>
    </div>
</div>

<div id="win-editor" class="window">
    <div class="window-header">
        <div class="win-controls"><div class="circle close" onclick="closeApp('win-editor')"></div><div class="circle min"></div><div class="circle max"></div></div>
        <div class="win-title">Notas v3</div>
    </div>
    <div class="window-content">
        <textarea id="editor-text" placeholder="Escribe tu historia..."></textarea>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button onclick="saveFileVFS()" style="background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Guardar en OS</button>
            <button onclick="exportReal('pdf')" style="background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Exportar PDF</button>
        </div>
    </div>
</div>

<div id="dock-container">
    <div class="dock-icon" onclick="openApp('win-files')">
        <div class="icon-shape" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
            <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        </div>
    </div>
    <div class="dock-icon" onclick="openApp('win-terminal')">
        <div class="icon-shape" style="background: #333;">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H5v-2h6v2zm9-4H5V8h15v4z"/></svg>
        </div>
    </div>
    <div class="dock-icon" onclick="openApp('win-editor')">
        <div class="icon-shape" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        </div>
    </div>
</div>

<script>
    // --- SISTEMA DE ARCHIVOS (VFS) REPARADO ---
    let vfs = JSON.parse(localStorage.getItem('webos_v3_fs')) || {
        "Bienvenida.txt": { type: "file", content: "Bienvenido a WebinwebOS v3.0\nTodo funciona sin bots." },
        "Proyectos": { type: "dir", content: {} }
    };

    function saveVFS() {
        localStorage.setItem('webos_v3_fs', JSON.stringify(vfs));
        renderDesktop();
        renderExplorer();
    }

    // Renderizar iconos en el escritorio
    function renderDesktop() {
        const desk = document.getElementById('desktop');
        desk.innerHTML = '';
        Object.keys(vfs).forEach(name => {
            const isDir = vfs[name].type === "dir";
            const item = document.createElement('div');
            item.className = 'desktop-item';
            item.innerHTML = `
                <div class="icon-shape" style="${isDir ? 'background: linear-gradient(135deg, #ffd166, #f78c6c)' : 'background: rgba(255,255,255,0.1)'}">
                    <svg viewBox="0 0 24 24"><path d="${isDir ? 'M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z' : 'M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z'}"></path></svg>
                </div>
                <div class="item-label">${name}</div>
            `;
            item.onclick = () => {
                if(!isDir) {
                    openApp('win-editor');
                    document.getElementById('editor-text').value = vfs[name].content;
                }
            };
            desk.appendChild(item);
        });
    }

    // Renderizar explorador
    function renderExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = '';
        Object.keys(vfs).forEach(name => {
            const item = document.createElement('div');
            item.className = 'desktop-item';
            item.innerHTML = `
                <div class="icon-shape" style="width:40px; height:40px;">
                    <svg style="width:20px;" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
                </div>
                <div class="item-label" style="font-size:10px;">${name}</div>
            `;
            view.appendChild(item);
        });
    }

    // --- TERMINAL ---
    const termIn = document.getElementById('term-in');
    const termOut = document.getElementById('term-out');

    termIn.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const input = termIn.value.trim();
            const [cmd, ...args] = input.split(' ');
            let res = `\nwebinweb@local:~$ ${input}\n`;

            if(cmd === 'ls') res += Object.keys(vfs).join('  ');
            else if(cmd === 'help') res += "Comandos: ls, sysinfo, clear, cat [file], rm [file]";
            else if(cmd === 'clear') { termOut.innerHTML = ''; termIn.value = ''; return; }
            else if(cmd === 'sysinfo') {
                res += `OS: WebinwebOS v3.0\nKernel: Browser-JS\nUI: Crystal Minimalist\nRAM: ${Math.round(performance.memory ? performance.memory.jsHeapSizeLimit/1024/1024 : 4096)}MB`;
            } else if(cmd === 'cat') {
                res += vfs[args[0]] ? vfs[args[0]].content : "Archivo no encontrado";
            } else res += "Comando desconocido.";

            termOut.innerHTML += res;
            termIn.value = '';
            termOut.parentElement.scrollTop = termOut.parentElement.scrollHeight;
        }
    });

    // --- FUNCIONES DE APP ---
    function openApp(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'win-files') renderExplorer();
    }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function saveFileVFS() {
        const name = prompt("Nombre del archivo (ej: nota.txt):");
        if(name) {
            vfs[name] = { type: "file", content: document.getElementById('editor-text').value };
            saveVFS();
            alert("Guardado en el escritorio.");
        }
    }

    function exportReal(type) {
        const text = document.getElementById('editor-text').value;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(text, 10, 10);
        doc.save("webos_export.pdf");
    }

    // --- ARRASTRE DE VENTANAS ---
    document.querySelectorAll('.window-header').forEach(header => {
        header.onmousedown = (e) => {
            const win = header.parentElement;
            let x = e.clientX - win.offsetLeft;
            let y = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = (e.clientX - x) + 'px';
                win.style.top = (e.clientY - y) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    // Inicializar
    renderDesktop();
</script>
</body>
</html>

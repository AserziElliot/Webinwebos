<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebinwebOS v5.0 - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00a2ff;
            --text: #ffffff;
            --bg-win: rgba(20, 20, 25, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body, html { 
            margin: 0; height: 100%; overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80') center/cover;
        }

        /* --- Escritorio --- */
        #desktop {
            width: 100vw; height: 100vh; padding: 20px;
            display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start;
        }

        /* --- Menu Contextual --- */
        #context-menu {
            position: absolute; display: none; background: rgba(30, 30, 35, 0.95);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 5px; z-index: 10000; min-width: 150px;
        }
        .menu-opt { padding: 8px 12px; color: white; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .menu-opt:hover { background: var(--accent); }

        /* --- Iconos Estilo Win11/MacOS --- */
        .item { 
            width: 90px; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.2s;
        }
        .item:hover { background: rgba(255,255,255,0.1); }
        .icon-box { 
            width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
        }
        .item-label { color: white; font-size: 12px; text-shadow: 0 2px 4px black; text-align: center; }

        /* --- Ventanas --- */
        .window {
            position: absolute; width: 700px; height: 450px; background: var(--bg-win);
            backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 12px;
            display: none; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10;
        }
        .win-header { padding: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; cursor: move; }
        .win-dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .d-red { background: #ff5f57; } .d-yel { background: #febc2e; } .d-grn { background: #28c840; }
        .win-title { flex: 1; text-align: center; color: #ccc; font-size: 13px; }
        .win-body { flex: 1; padding: 15px; overflow: auto; color: white; }

        /* --- Dock --- */
        #dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            padding: 8px 15px; border-radius: 18px; border: 1px solid var(--glass-border);
            display: flex; gap: 12px; z-index: 1000;
        }
        .dock-app { width: 45px; height: 45px; cursor: pointer; transition: 0.3s; }
        .dock-app:hover { transform: translateY(-10px) scale(1.2); }

        /* --- Apps Inputs --- */
        textarea { width: 100%; height: 80%; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; resize: none; }
        #term-out { font-family: monospace; color: #0f0; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: white; }
    </style>
</head>
<body oncontextmenu="return openContextMenu(event)">

<div id="desktop"></div>

<div id="context-menu">
    <div class="menu-opt" onclick="newFile()">Nuevo Archivo</div>
    <div class="menu-opt" onclick="newFolder()">Nueva Carpeta</div>
</div>

<div id="win-files" class="window" style="top:50px; left:50px;">
    <div class="win-header">
        <div class="win-dots"><div class="dot d-red" onclick="closeApp('win-files')"></div></div>
        <div class="win-title">Explorador de Archivos</div>
    </div>
    <div class="win-body"><div id="explorer-view" style="display:flex; gap:15px; flex-wrap:wrap;"></div></div>
</div>

<div id="win-terminal" class="window" style="top:80px; left:80px;">
    <div class="win-header">
        <div class="win-dots"><div class="dot d-red" onclick="closeApp('win-terminal')"></div></div>
        <div class="win-title">Terminal Linux</div>
    </div>
    <div class="win-body" style="background:#000;">
        <div id="term-out">WebinwebOS v5.0 Kernel ready.<br>Type 'help' for commands.</div>
        <div style="display:flex;"><span>$ </span><input type="text" id="term-in" style="background:none; border:none; color:#0f0; outline:none; flex:1; padding-left:10px;"></div>
    </div>
</div>

<div id="win-editor" class="window" style="top:110px; left:110px;">
    <div class="win-header">
        <div class="win-dots"><div class="dot d-red" onclick="closeApp('win-editor')"></div></div>
        <div class="win-title">Escritor de Textos</div>
    </div>
    <div class="win-body">
        <textarea id="editor-text" placeholder="Escribe algo..."></textarea>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <button onclick="saveToOS()">Guardar en OS</button>
            <button onclick="exportDoc('pdf')">Export PDF</button>
            <button onclick="exportDoc('docx')">Export DOCX</button>
        </div>
    </div>
</div>

<div id="win-browser" class="window" style="top:40px; left:150px; width:80%; height:80%;">
    <div class="win-header">
        <div class="win-dots"><div class="dot d-red" onclick="closeApp('win-browser')"></div></div>
        <div class="win-title">Navegador</div>
    </div>
    <div style="padding:10px; background:#1e1e1e; display:flex; gap:10px;">
        <input type="text" id="nav-url" value="https://www.bing.com" style="flex:1; border-radius:5px; padding:5px;">
        <button onclick="goNav()">Ir</button>
    </div>
    <div class="win-body" style="padding:0;"><iframe id="nav-frame" src="https://www.bing.com"></iframe></div>
</div>

<div id="win-chat" class="window" style="top:150px; left:200px; width:400px; height:500px;">
    <div class="win-header">
        <div class="win-dots"><div class="dot d-red" onclick="closeApp('win-chat')"></div></div>
        <div class="win-title">Chat Online</div>
    </div>
    <div class="win-body" style="display:flex; flex-direction:column;">
        <div id="chat-box" style="flex:1; border:1px solid var(--glass-border); margin-bottom:10px; padding:10px; font-size:13px;"></div>
        <input type="text" id="chat-msg" placeholder="Escribe mensaje..." style="background:#222; color:white; border:none; padding:8px;">
    </div>
</div>

<div id="dock">
    <div class="dock-app" onclick="openApp('win-files')" title="Archivos"><svg viewBox="0 0 24 24" style="fill:#ffc107"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
    <div class="dock-app" onclick="openApp('win-terminal')" title="Terminal"><svg viewBox="0 0 24 24" style="fill:#333"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H5v-2h6v2zm9-4H5V8h15v4z"/></svg></div>
    <div class="dock-app" onclick="openApp('win-editor')" title="Editor"><svg viewBox="0 0 24 24" style="fill:#03a9f4"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></div>
    <div class="dock-app" onclick="openApp('win-browser')" title="Navegador"><svg viewBox="0 0 24 24" style="fill:#4caf50"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
    <div class="dock-app" onclick="openApp('win-chat')" title="Chat"><svg viewBox="0 0 24 24" style="fill:#e91e63"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
</div>

<script>
    // --- LÓGICA DE ARCHIVOS ---
    let fs = JSON.parse(localStorage.getItem('webos_v5_fs')) || {
        "Bienvenida.txt": { type: "file", content: "¡Funciona! Doble clic para abrir." },
        "Proyectos": { type: "dir", content: {} }
    };

    function saveFS() { 
        localStorage.setItem('webos_v5_fs', JSON.stringify(fs)); 
        renderDesktop(); 
    }

    function renderDesktop() {
        const desk = document.getElementById('desktop');
        desk.innerHTML = '';
        Object.keys(fs).forEach(name => {
            const isDir = fs[name].type === 'dir';
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="icon-box" style="background: ${isDir ? 'linear-gradient(135deg, #ffd166, #f78c6c)' : 'rgba(255,255,255,0.1)'}">
                    <svg width="30" viewBox="0 0 24 24" style="fill:white"><path d="${isDir ? 'M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z' : 'M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z'}"></path></svg>
                </div>
                <div class="item-label">${name}</div>
            `;
            // SOLUCIÓN: Clic en carpeta abre explorador, archivo abre editor
            div.ondblclick = () => {
                if(isDir) openApp('win-files');
                else {
                    openApp('win-editor');
                    document.getElementById('editor-text').value = fs[name].content;
                }
            };
            desk.appendChild(div);
        });
    }

    // --- MANEJO DE VENTANAS ---
    let highestZ = 100;
    function openApp(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++highestZ;
    }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    // Traer al frente al hacer clic
    document.querySelectorAll('.window').forEach(win => {
        win.onmousedown = () => { win.style.zIndex = ++highestZ; };
    });

    // --- MENU CONTEXTUAL ---
    function openContextMenu(e) {
        e.preventDefault();
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        return false;
    }
    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function newFile() {
        const name = prompt("Nombre del archivo:");
        if(name) { fs[name + ".txt"] = { type: 'file', content: '' }; saveFS(); }
    }
    function newFolder() {
        const name = prompt("Nombre de la carpeta:");
        if(name) { fs[name] = { type: 'dir', content: {} }; saveFS(); }
    }

    // --- TERMINAL ---
    document.getElementById('term-in').onkeydown = (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value.toLowerCase();
            const out = document.getElementById('term-out');
            let res = `<br>> ${val}<br>`;
            if(val === 'ls') res += Object.keys(fs).join('  ');
            else if(val === 'help') res += "ls, sysinfo, clear, date";
            else if(val === 'date') res += new Date().toLocaleString();
            else if(val === 'sysinfo') res += "WebinwebOS v5.0 | Kernel 1.0.0-JS | RAM: 8GB Virtual";
            else if(val === 'clear') { out.innerHTML = ''; e.target.value = ''; return; }
            else res += "Comando no reconocido.";
            out.innerHTML += res;
            e.target.value = '';
        }
    }

    // --- FUNCIONES EXTRA ---
    function goNav() { document.getElementById('nav-frame').src = document.getElementById('nav-url').value; }
    function saveToOS() { 
        const n = prompt("Guardar como:"); 
        if(n) { fs[n] = {type:'file', content: document.getElementById('editor-text').value}; saveFS(); }
    }

    // --- ARRASTRE ---
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            let win = h.parentElement;
            let ox = e.clientX - win.offsetLeft;
            let oy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = (e.clientX - ox) + 'px';
                win.style.top = (e.clientY - oy) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }
    });

    renderDesktop();
</script>
</body>
</html>
